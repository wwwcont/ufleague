services:
  postgres:
    image: postgres:16-alpine
    container_name: football-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-football_ui}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-football_ui}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: football-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8082
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-football_ui}?sslmode=disable
      DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED:-true}
      TELEGRAM_MOCK_LOGIN_ENABLED: ${TELEGRAM_MOCK_LOGIN_ENABLED:-true}
      TELEGRAM_MOCK_CODE: ${TELEGRAM_MOCK_CODE:-UFL-SUPERADMIN-2026}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

volumes:
  postgres_data:
